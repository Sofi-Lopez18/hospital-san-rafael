# ============================================
# Hospital Universitario San Rafael
# Configuración de la Aplicación
# ============================================

spring.application.name=Hospital San Rafael

# --- Base de Datos PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/hospital_san_rafael
spring.datasource.username=postgres
spring.datasource.password=180921
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- Servidor ---
server.port=8081
server.servlet.context-path=/

# --- Logging ---
logging.level.com.hospitalsr=DEBUG
logging.level.org.springframework.security=WARN

# --- Subida de Archivos ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

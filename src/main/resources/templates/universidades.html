<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universidades — Hospital San Rafael</title>
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
  <div th:replace="~{fragments/sidebar :: sidebar('universidades')}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/sidebar :: topbar}"></div>
    <main class="page-content">
      <div class="page-header">
        <div>
          <div class="page-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Gestión de Universidades
          </div>
          <div class="page-subtitle">Instituciones académicas vinculadas al hospital</div>
        </div>
        <button
          onclick="setModalTitle('new'); document.getElementById('univId').value=''; document.getElementById('univNombre').value=''; document.getElementById('univCiudad').value=''; openModal('modalUniv');"
          class="btn btn-primary">+ Nueva Universidad
        </button>
      </div>

      <div th:if="${mensaje}" class="alert"
        th:classappend="${tipoMensaje == 'success'} ? ' alert-success' : ' alert-error'" th:text="${mensaje}"></div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Universidades Registradas
            <span class="badge badge-teal" style="margin-left:8px;"
              th:text="${universidades.size()} + ' registros'">0</span>
          </span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Universidad</th>
                <th>Ciudad</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${universidades.isEmpty()}">
                <td colspan="5" class="empty-state">No hay universidades registradas</td>
              </tr>
              <tr th:each="u, i : ${universidades}">
                <td class="text-sm text-slate" th:text="${i.index + 1}">1</td>
                <td>
                  <div style="display:flex;align-items:center;gap:10px;">
                    <div class="avatar-circle"
                      style="background:linear-gradient(135deg,#8b5cf6,#6d28d9);width:34px;height:34px;font-size:13px;">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                      </svg>
                    </div>
                    <span class="font-semibold" th:text="${u.nombre}">Universidad</span>
                  </div>
                </td>
                <td class="text-sm text-slate" th:text="${u.ciudad ?: '—'}">Ciudad</td>
                <td>
                  <span th:if="${u.estado}" class="badge badge-green">Activa</span>
                  <span th:unless="${u.estado}" class="badge badge-slate">Inactiva</span>
                </td>
                <td>
                  <div class="flex gap-2">
                    <button class="btn btn-outline btn-icon btn-sm" th:data-id="${u.id}" th:data-nombre="${u.nombre}"
                      th:data-ciudad="${u.ciudad}" onclick="cargarUniv(this)">
                      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                      </svg>
                    </button>
                    <form th:action="@{/universidades/eliminar/{id}(id=${u.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('¿Eliminar esta universidad?')">
                      <button type="submit" class="btn btn-outline btn-icon btn-sm" style="color:var(--red-500);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <polyline points="3 6 5 6 21 6" />
                          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                          <path d="M10 11v6M14 11v6" />
                          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                        </svg>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Modal -->
      <div class="modal-overlay" id="modalUniv">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title" id="modalUnivTitle">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Nueva Universidad
            </span>
            <button class="modal-close" onclick="closeModal('modalUniv')">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
          <form th:action="@{/universidades/guardar}" method="post">
            <div class="modal-body">
              <input type="hidden" name="univId" id="univId" />
              <div class="form-group">
                <label class="form-label">Nombre de la Universidad *</label>
                <input type="text" name="nombre" id="univNombre" class="form-control" required
                  placeholder="Ej: Universidad de Boyacá" />
              </div>
              <div class="form-group">
                <label class="form-label">Ciudad</label>
                <input type="text" name="ciudad" id="univCiudad" class="form-control" placeholder="Ej: Tunja" />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline" onclick="closeModal('modalUniv')">Cancelar</button>
              <button type="submit" class="btn btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                  <polyline points="17 21 17 13 7 13 7 21" />
                  <polyline points="7 3 7 8 15 8" />
                </svg>
                Guardar
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script>
    const SVG_NUEVA = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    const SVG_EDITAR = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

    function setModalTitle(mode) {
      const el = document.getElementById('modalUnivTitle');
      if (mode === 'new') {
        el.innerHTML = SVG_NUEVA + ' Nueva Universidad';
      } else {
        el.innerHTML = SVG_EDITAR + ' Editar Universidad';
      }
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function cargarUniv(btn) {
      document.getElementById('univId').value = btn.dataset.id;
      document.getElementById('univNombre').value = btn.dataset.nombre;
      document.getElementById('univCiudad').value = btn.dataset.ciudad || '';
      setModalTitle('edit');
      openModal('modalUniv');
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(function (m) {
          m.classList.remove('open');
        });
      }
    });
  </script>
</body>

</html>

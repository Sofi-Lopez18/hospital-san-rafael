<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Presencia — Hospital San Rafael</title>
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar('presencia')}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/sidebar :: topbar}"></div>
    <main class="page-content">
      <div class="page-header">
        <div>
          <div class="page-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 15.5A9 9 0 0 1 12 3a9 9 0 0 1 6.5 12.5" />
              <path d="M8.5 12.5A5 5 0 0 1 12 7a5 5 0 0 1 3.5 5.5" />
              <circle cx="12" cy="12" r="1" />
            </svg>
            Panel de Presencia
          </div>
          <div class="page-subtitle">Control de ingreso y salida en tiempo real</div>
        </div>
      </div>
      <div th:if="${mensaje}" class="alert"
        th:classappend="${tipoMensaje == 'success'} ? ' alert-success' : (${tipoMensaje == 'warning'} ? ' alert-warning' : ' alert-error')"
        th:text="${mensaje}"></div>

      <div class="checkin-bar">
        <input type="text" id="cedulaInput" class="form-control" placeholder="Ingrese número de cédula del estudiante"
          style="font-size:14px;padding:11px 16px;" />
        <div class="actions">
          <form th:action="@{/presencia/checkin}" method="post" style="display:inline;"
            onsubmit="syncCedula('hiddenIn')">
            <input type="hidden" name="cedula" id="hiddenIn" />
            <button type="submit" class="btn btn-success">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              Check In
            </button>
          </form>
          <form th:action="@{/presencia/checkout}" method="post" style="display:inline;"
            onsubmit="syncCedula('hiddenOut')">
            <input type="hidden" name="cedula" id="hiddenOut" />
            <button type="submit" class="btn btn-danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
              Check Out
            </button>
          </form>
        </div>
      </div>

      <div class="stats-grid" style="margin-bottom:20px;">
        <div class="stat-card">
          <div class="stat-icon blue">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
          <div>
            <div class="stat-label">En el Hospital</div>
            <div class="stat-value blue" th:text="${estudiantesDentro}">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon teal">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
              <path d="M6 12v5c3 3 9 3 12 0v-5" />
            </svg>
          </div>
          <div>
            <div class="stat-label">Estudiantes Activos</div>
            <div class="stat-value teal" th:text="${estudiantesActivos}">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
              <line x1="12" y1="9" x2="12" y2="13" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
          </div>
          <div>
            <div class="stat-label">Alertas</div>
            <div class="stat-value amber">0</div>
          </div>
        </div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Estudiantes Presentes</span>
            <span class="badge badge-green" th:text="${estudiantesDentro} + ' dentro'">0</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Estudiante</th>
                  <th>Área</th>
                  <th>H. Ingreso</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody>
                <tr th:if="${accesosHoy.isEmpty()}">
                  <td colspan="5" class="empty-state">No hay estudiantes en el hospital en este momento</td>
                </tr>
                <tr th:each="a, i : ${accesosHoy}">
                  <td class="text-sm text-slate" th:text="${i.index + 1}">1</td>
                  <td>
                    <div class="student-row">
                      <div class="avatar-circle"
                        style="background:linear-gradient(135deg,#14b8a6,#0f766e);width:32px;height:32px;font-size:12px;"
                        th:text="${#strings.substring(a.estudiante.nombres,0,1)}">J</div>
                      <div>
                        <div class="student-name" th:text="${a.estudiante.getNombreCompleto()}">Nombre</div>
                        <div class="student-id" th:text="${a.estudiante.documento}">Doc</div>
                      </div>
                    </div>
                  </td>
                  <td><span class="badge badge-teal" th:text="${a.especialidad?.nombre ?: '—'}">—</span></td>
                  <td class="text-sm"
                    th:text="${a.horaIngreso != null ? #temporals.format(a.horaIngreso,'HH:mm') : '—'}">—</td>
                  <td><span class="badge badge-green">● DENTRO</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Capacidad por Área</span></div>
          <div class="card-body">
            <div class="capacity-list">
              <div th:each="area : ${areas}" class="capacity-item">
                <div class="capacity-header">
                  <div>
                    <div class="capacity-name" th:text="${area.nombre}">Área</div>
                    <div class="capacity-sub" th:text="${area.sede ?: 'Sede Principal'}">Sede</div>
                  </div>
                  <span class="text-sm text-slate">0/<span th:text="${area.capacidadMaxima}">0</span></span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width:0%"></div>
                </div>
              </div>
              <div th:if="${areas.isEmpty()}" class="empty-state">Sin áreas</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    function syncCedula(hiddenId) {
      var val = document.getElementById('cedulaInput').value.trim();
      if (!val) { alert('Por favor ingrese el número de cédula.'); return false; }
      document.getElementById(hiddenId).value = val;
      return true;
    }
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  </script>
</body>

</html>

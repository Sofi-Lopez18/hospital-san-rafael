<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Horario — Hospital San Rafael</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <style>
        .mes-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mes-nav a {
            padding: 6px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            text-decoration: none;
            color: #0f766e;
            font-weight: 600;
            font-size: 13px;
            transition: .15s;
        }

        .mes-nav a:hover {
            background: #f0fdfa;
        }

        .turno-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: .15s;
        }

        .turno-card:hover {
            border-color: #0d9488;
            box-shadow: 0 2px 8px rgba(13, 148, 136, .1);
        }

        .turno-fecha {
            min-width: 70px;
            text-align: center;
            background: #f0fdfa;
            border-radius: 10px;
            padding: 10px 8px;
        }

        .turno-fecha .dia {
            font-size: 24px;
            font-weight: 800;
            color: #0f766e;
            line-height: 1;
        }

        .turno-fecha .mes-abr {
            font-size: 11px;
            font-weight: 700;
            color: #0d9488;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .turno-fecha .dow {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .turno-info {
            flex: 1;
        }

        .turno-area {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
        }

        .turno-hora {
            font-size: 13px;
            color: #64748b;
            margin-top: 3px;
        }

        .empty-horario {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-horario svg {
            opacity: .25;
            margin-bottom: 16px;
        }

        .empty-horario p {
            color: #94a3b8;
            font-size: 15px;
        }

        .mes-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            text-transform: capitalize;
        }


        /* === Colores dinámicos por área === */
        :root {
            --ac0: #0d9488;
            --ac1: #7c3aed;
            --ac2: #2563eb;
            --ac3: #d97706;
            --ac4: #e11d48;
            --ac5: #059669;
            --ac6: #9333ea;
            --ac7: #0891b2;
            --ac8: #c2410c;
            --ac9: #4f46e5;
        }

        .area-card-0 {
            border-left: 4px solid var(--ac0);
        }

        .area-badge-0 {
            background: var(--ac0);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-1 {
            border-left: 4px solid var(--ac1);
        }

        .area-badge-1 {
            background: var(--ac1);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-2 {
            border-left: 4px solid var(--ac2);
        }

        .area-badge-2 {
            background: var(--ac2);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-3 {
            border-left: 4px solid var(--ac3);
        }

        .area-badge-3 {
            background: var(--ac3);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-4 {
            border-left: 4px solid var(--ac4);
        }

        .area-badge-4 {
            background: var(--ac4);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-5 {
            border-left: 4px solid var(--ac5);
        }

        .area-badge-5 {
            background: var(--ac5);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-6 {
            border-left: 4px solid var(--ac6);
        }

        .area-badge-6 {
            background: var(--ac6);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-7 {
            border-left: 4px solid var(--ac7);
        }

        .area-badge-7 {
            background: var(--ac7);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-8 {
            border-left: 4px solid var(--ac8);
        }

        .area-badge-8 {
            background: var(--ac8);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .area-card-9 {
            border-left: 4px solid var(--ac9);
        }

        .area-badge-9 {
            background: var(--ac9);
            color: #fff;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .resumen-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0fdfa;
            border: 1px solid #99f6e4;
            border-radius: 99px;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #0f766e;
        }
    </style>
</head>

<body class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('est-horario')}"></div>
    <div class="main-wrap">
        <div th:replace="~{fragments/sidebar :: topbar}"></div>
        <main class="page-content">

            <div class="page-header">
                <div>
                    <div class="page-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                            <line x1="16" y1="2" x2="16" y2="6" />
                            <line x1="8" y1="2" x2="8" y2="6" />
                            <line x1="3" y1="10" x2="21" y2="10" />
                        </svg>
                        Mi Horario Asignado
                    </div>
                    <div class="page-subtitle"
                        th:text="${estudiante.programa + ' · ' + (estudiante.universidad?.nombre ?: '')}">Programa</div>
                </div>
                <!-- Navegación mes -->
                <div class="mes-nav">
                    <a
                        th:href="@{/estudiante/mi-horario(mes=${mes > 1 ? mes - 1 : 12}, anio=${mes > 1 ? anio : anio - 1})}">←
                        Anterior</a>
                    <span class="mes-title" th:text="${#temporals.format(mesDate,'MMMM yyyy')}">Mayo 2026</span>
                    <a
                        th:href="@{/estudiante/mi-horario(mes=${mes < 12 ? mes + 1 : 1}, anio=${mes < 12 ? anio : anio + 1})}">Siguiente
                        →</a>
                </div>
            </div>

            <!-- Resumen -->
            <div style="margin-bottom:20px;" th:if="${!turnos.isEmpty()}">
                <span class="resumen-pill">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span th:text="${turnos.size()} + ' turnos asignados este mes'">0 turnos</span>
                </span>
            </div>

            <!-- Lista de turnos -->
            <div th:if="${turnos.isEmpty()}" class="empty-horario">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                    stroke="#0f766e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <p>No tienes turnos asignados para este mes.<br />Consulta con tu coordinador de prácticas.</p>
            </div>

            <div th:each="turno : ${turnos}" class="turno-card"
                th:classappend="${'area-card-'+(turno.especialidad.id % 10)}">
                <div class="turno-fecha">
                    <div class="dia" th:text="${turno.fecha.dayOfMonth}">1</div>
                    <div class="mes-abr" th:text="${#temporals.format(turno.fecha,'MMM')}">May</div>
                    <div class="dow" th:text="${#temporals.format(turno.fecha,'EEE')}">Lun</div>
                </div>
                <div class="turno-info">
                    <div class="turno-area">
                        <span th:classappend="${'area-badge-'+(turno.especialidad.id % 10)}"
                            th:text="${turno.especialidad?.nombre ?: '—'}">Área</span>
                    </div>
                    <div class="turno-hora">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="vertical-align:middle;">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <span th:text="${turno.horaInicio + ' – ' + turno.horaFin}">07:00 – 13:00</span>
                    </div>
                    <div style="font-size:11px;color:#94a3b8;margin-top:3px;"
                        th:if="${turno.programacion?.tutorHospital != null}"
                        th:text="'Tutor: ' + ${turno.programacion.tutorHospital.nombre}">Tutor</div>
                </div>
                <!-- Indicador si es hoy -->
                <div th:if="${turno.fecha == #temporals.createToday()}">
                    <span
                        style="background:#fef9c3;color:#854d0e;border-radius:99px;padding:3px 12px;font-size:11px;font-weight:700;">HOY</span>
                </div>
            </div>

        </main>
    </div>
</body>

</html>

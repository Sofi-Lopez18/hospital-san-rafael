<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios — Hospital San Rafael</title>
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
  <div th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/sidebar :: topbar}"></div>
    <main class="page-content">
      <div class="page-header">
        <div>
          <div class="page-title"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg> Gestión de Usuarios</div>
          <div class="page-subtitle">Administración de accesos y permisos del sistema</div>
        </div>
        <button
          onclick="openModal('modalUsuario');document.getElementById('usuarioId').value='';document.getElementById('modalUsuarioTitle').innerHTML='<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;15&quot; height=&quot;15&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><line x1=&quot;12&quot; y1=&quot;5&quot; x2=&quot;12&quot; y2=&quot;19&quot;/><line x1=&quot;5&quot; y1=&quot;12&quot; x2=&quot;19&quot; y2=&quot;12&quot;/></svg> Nuevo Usuario';"
          class="btn btn-primary">+ Nuevo Usuario</button>
      </div>
      <div class="user-cards">
        <div th:if="${usuarios.isEmpty()}" class="card">
          <div class="empty-state">No hay usuarios registrados</div>
        </div>
        <div th:each="u : ${usuarios}" class="user-card-item">
          <div class="user-card-left">
            <div class="avatar-circle"
              th:style="'background:linear-gradient(135deg,' + (${u.rol == 'DIRECTOR'} ? '#8b5cf6,#6d28d9' : (${u.rol == 'MEDICO'} ? '#3b82f6,#1d4ed8' : (${u.rol == 'DOCENTE'} ? '#f59e0b,#d97706' : '#14b8a6,#0f766e'))) + ');'"
              th:text="${#strings.substring(u.nombre,0,1)}">A</div>
            <div>
              <div class="user-card-info flex items-center gap-2">
                <span class="name" style="font-size:15px;font-weight:700;" th:text="${u.nombre}">Nombre</span>
                <span class="badge"
                  th:classappend="${u.rol == 'ADMINISTRADOR'} ? ' badge-teal' : (${u.rol == 'DIRECTOR'} ? ' badge-violet' : (${u.rol == 'MEDICO'} ? ' badge-blue' : ' badge-amber'))"
                  th:text="${u.rol}">Rol</span>
              </div>
              <div class="cedula" style="font-size:12px;color:var(--slate-400);margin-top:3px;">
                Cédula: <span th:text="${u.cedula}">000</span> &nbsp;·&nbsp; Usuario: <span
                  th:text="${u.username}">admin</span>
              </div>
              <div class="user-perms">
                <span th:if="${u.rol == 'ADMINISTRADOR' or u.rol == 'DIRECTOR'}" class="perm-tag">ver cronogramas</span>
                <span th:if="${u.rol == 'ADMINISTRADOR' or u.rol == 'DIRECTOR' or u.rol == 'DOCENTE'}"
                  class="perm-tag">editar cronogramas</span>
                <span th:if="${u.rol != 'DOCENTE'}" class="perm-tag">gestionar horarios</span>
                <span class="perm-tag">ver reportes</span>
                <span th:if="${u.rol == 'ADMINISTRADOR' or u.rol == 'DIRECTOR'}" class="perm-tag">asignar
                  estudiantes</span>
                <span class="perm-tag">ver presencia</span>
                <span th:if="${u.rol == 'ADMINISTRADOR'}" class="perm-tag">gestionar áreas</span>
                <span th:if="${u.rol == 'ADMINISTRADOR'}" class="perm-tag">crear usuarios</span>
              </div>
            </div>
          </div>
          <div class="flex gap-2 items-center">
            <button class="btn btn-outline btn-icon btn-sm" th:data-id="${u.id}" th:data-nombre="${u.nombre}"
              th:data-username="${u.username}" th:data-cedula="${u.cedula}" th:data-rol="${u.rol}"
              onclick="cargarUsuario(this)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg></button>
            <form th:action="@{/usuarios/eliminar/{id}(id=${u.id})}" method="post" style="display:inline;"
              onsubmit="return confirm('¿Eliminar este usuario?')">
              <button type="submit" class="btn btn-outline btn-icon btn-sm" style="color:var(--red-500);"><svg
                  xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                  <path d="M10 11v6M14 11v6" />
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                </svg></button>
            </form>
          </div>
        </div>
      </div>
      <!-- Modal -->
      <div class="modal-overlay" id="modalUsuario">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title" id="modalUsuarioTitle"><svg xmlns="http://www.w3.org/2000/svg" width="15"
                height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg> Nuevo Usuario</span>
            <button class="modal-close" onclick="closeModal('modalUsuario')"><svg xmlns="http://www.w3.org/2000/svg"
                width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg></button>
          </div>
          <form th:action="@{/usuarios/guardar}" method="post">
            <div class="modal-body">
              <input type="hidden" name="usuarioId" id="usuarioId" />
              <div class="form-group"><label class="form-label">Nombre Completo *</label><input type="text"
                  name="nombre" id="uNombre" class="form-control" required placeholder="Dr. Nombre Apellido" /></div>
              <div class="form-grid form-grid-2">
                <div class="form-group"><label class="form-label">Usuario (login) *</label><input type="text"
                    name="username" id="uUsername" class="form-control" required placeholder="usuario" /></div>
                <div class="form-group"><label class="form-label">Contraseña *</label><input type="password"
                    name="password" class="form-control" placeholder="Dejar vacío para no cambiar" /></div>
              </div>
              <div class="form-grid form-grid-2">
                <div class="form-group"><label class="form-label">Cédula *</label><input type="text" name="cedula"
                    id="uCedula" class="form-control" required placeholder="N° de cédula" /></div>
                <div class="form-group">
                  <label class="form-label">Rol *</label>
                  <select name="rol" id="uRol" class="form-select" required>
                    <option value="ADMINISTRADOR">Administrador</option>
                    <option value="DIRECTOR">Director</option>
                    <option value="MEDICO">Médico</option>
                    <option value="DOCENTE">Docente</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline" onclick="closeModal('modalUsuario')">Cancelar</button>
              <button type="submit" class="btn btn-primary"><svg xmlns="http://www.w3.org/2000/svg" width="15"
                  height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                  <polyline points="17 21 17 13 7 13 7 21" />
                  <polyline points="7 3 7 8 15 8" />
                </svg> Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script>
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function cargarUsuario(btn) {
      document.getElementById('usuarioId').value = btn.dataset.id;
      document.getElementById('uNombre').value = btn.dataset.nombre;
      document.getElementById('uUsername').value = btn.dataset.username;
      document.getElementById('uCedula').value = btn.dataset.cedula;
      document.getElementById('uRol').value = btn.dataset.rol;
      document.getElementById('modalUsuarioTitle').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar Usuario';
      openModal('modalUsuario');
    }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(function (m) { m.classList.remove('open'); }); });
  </script>
</body>

</html>

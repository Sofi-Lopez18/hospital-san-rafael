<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Áreas — Hospital San Rafael</title>
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
  <div th:replace="~{fragments/sidebar :: sidebar('areas')}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/sidebar :: topbar}"></div>
    <main class="page-content">
      <div class="page-header">
        <div>
          <div class="page-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M3 9h18M9 21V9" />
            </svg>
            Gestión de Áreas
          </div>
          <div class="page-subtitle">Configuración de especialidades y capacidades</div>
        </div>
        <button onclick="setModalTitle('new'); document.getElementById('areaId').value=''; openModal('modalArea');"
          class="btn btn-violet">
          + Nueva Área
        </button>
      </div>

      <div th:if="${mensaje}" class="alert"
        th:classappend="${tipoMensaje == 'success'} ? ' alert-success' : ' alert-error'" th:text="${mensaje}"></div>

      <div class="areas-grid">
        <div th:if="${areas.isEmpty()}" style="grid-column:1/-1;" class="card">
          <div class="empty-state">No hay áreas configuradas</div>
        </div>
        <div th:each="area, i : ${areas}" class="area-card">
          <div class="area-card-header">
            <div class="area-name">
              <!-- Ícono rotativo según índice -->
              <span th:if="${i.index % 4 == 0}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8 6h8M8 10h8M8 14h5" />
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <path d="M12 3v5M9.5 5.5h5" />
                </svg>
              </span>
              <span th:if="${i.index % 4 == 1}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18" />
                </svg>
              </span>
              <span th:if="${i.index % 4 == 2}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 12h.01M15 12h.01M10 16s.5 1 2 1 2-1 2-1" />
                  <circle cx="12" cy="8" r="5" />
                  <path d="M5 20c0-3.3 3.1-6 7-6s7 2.7 7 6" />
                </svg>
              </span>
              <span th:if="${i.index % 4 == 3}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
              </span>
              <span th:text="${area.nombre}">Área</span>
            </div>
            <div class="flex gap-2">
              <button class="btn btn-outline btn-icon btn-sm" th:data-id="${area.id}" th:data-nombre="${area.nombre}"
                th:data-sede="${area.sede}" th:data-capacidad="${area.capacidadMaxima}" onclick="cargarArea(this)">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
              </button>
              <form th:action="@{/areas/eliminar/{id}(id=${area.id})}" method="post" style="display:inline;"
                onsubmit="return confirm('¿Eliminar esta área?')">
                <button type="submit" class="btn btn-outline btn-icon btn-sm" style="color:var(--red-500);">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                    <path d="M10 11v6M14 11v6" />
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                  </svg>
                </button>
              </form>
            </div>
          </div>
          <div class="area-meta">
            <div class="area-meta-row">
              <span class="area-meta-label">Capacidad Máxima:</span>
              <span class="badge badge-violet" th:text="${area.capacidadMaxima} + ' estudiantes'">0</span>
            </div>
            <div style="margin-top:6px;font-size:11px;color:var(--slate-400);">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
              <span th:text="${area.sede ?: 'Sin sede'}">Sede</span>
            </div>
            <div style="margin-top:12px;">
              <div class="capacity-header" style="margin-bottom:4px;">
                <span class="text-sm text-slate">Ocupación actual</span>
                <span class="text-sm text-slate">0 / <span th:text="${area.capacidadMaxima}">0</span></span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:0%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal -->
      <div class="modal-overlay" id="modalArea">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title" id="modalAreaTitle">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Nueva Área
            </span>
            <button class="modal-close" onclick="closeModal('modalArea')">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
          <form th:action="@{/areas/guardar}" method="post">
            <div class="modal-body">
              <input type="hidden" name="areaId" id="areaId" />
              <div class="form-group">
                <label class="form-label">Nombre del Área *</label>
                <input type="text" name="nombre" id="areaNombre" class="form-control" required
                  placeholder="Ej: Urgencias, Cardiología..." />
              </div>
              <div class="form-group">
                <label class="form-label">Sede / Ubicación</label>
                <input type="text" name="sede" id="areaSede" class="form-control"
                  placeholder="Ej: Tunja - Sede Principal" />
              </div>
              <div class="form-group">
                <label class="form-label">Capacidad Máxima *</label>
                <input type="number" name="capacidadMaxima" id="areaCapacidad" class="form-control" required min="1"
                  max="50" placeholder="Ej: 5" />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline" onclick="closeModal('modalArea')">Cancelar</button>
              <button type="submit" class="btn btn-violet">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                  <polyline points="17 21 17 13 7 13 7 21" />
                  <polyline points="7 3 7 8 15 8" />
                </svg>
                Guardar Área
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script>
    const SVG_NUEVA = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    const SVG_EDITAR = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

    function setModalTitle(mode) {
      const el = document.getElementById('modalAreaTitle');
      if (mode === 'new') {
        el.innerHTML = SVG_NUEVA + ' Nueva Área';
      } else {
        el.innerHTML = SVG_EDITAR + ' Editar Área';
      }
    }

    function openModal(id) {
      document.getElementById(id).classList.add('open');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    function cargarArea(btn) {
      document.getElementById('areaId').value = btn.dataset.id;
      document.getElementById('areaNombre').value = btn.dataset.nombre;
      document.getElementById('areaSede').value = btn.dataset.sede || '';
      document.getElementById('areaCapacidad').value = btn.dataset.capacidad || '';
      setModalTitle('edit');
      openModal('modalArea');
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(function (m) {
          m.classList.remove('open');
        });
      }
    });
  </script>
</body>

</html>
